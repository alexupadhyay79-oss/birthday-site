<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Legendary Birthday</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: sans-serif;
  color: white;
  text-align: center;
}

/* INTRO SCREEN */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  z-index: 10;
  animation: fadeOut 3s forwards 3s;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* MAIN */
#main {
  opacity: 0;
  animation: show 2s forwards 3s;
}

@keyframes show {
  to { opacity: 1; }
}

/* TYPING TEXT */
h1 {
  margin-top: 20px;
  border-right: 3px solid white;
  width: 0;
  white-space: nowrap;
  overflow: hidden;
  animation: typing 3s steps(30) forwards 4s;
}

@keyframes typing {
  to { width: 100%; }
}

/* CAKE */
.cake {
  margin: 80px auto;
  width: 220px;
  perspective: 1000px;
}

.inner {
  transition: 0.5s;
}

.cake:hover .inner {
  transform: rotateX(10deg) rotateY(10deg);
}

.layer {
  width: 220px;
  height: 50px;
  background: linear-gradient(#6b3e26,#3e1f12);
  border-radius: 10px;
  margin: 5px 0;
}

.icing {
  width: 220px;
  height: 20px;
  background: white;
  border-radius: 20px;
}

/* CANDLE */
.candle {
  width: 12px;
  height: 45px;
  background: repeating-linear-gradient(45deg,white 4px,red 8px);
  margin: auto;
  position: relative;
}

.flame {
  width: 14px;
  height: 20px;
  background: orange;
  border-radius: 50%;
  position: absolute;
  top: -20px;
  left: -1px;
  animation: flicker 0.2s infinite;
}

/* BALLOONS */
.balloon {
  position: absolute;
  width: 30px;
  height: 40px;
  background: red;
  border-radius: 50%;
  animation: float 6s infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-100vh); }
}

/* GIFT */
.gift {
  width: 80px;
  height: 80px;
  background: red;
  margin: auto;
  cursor: pointer;
}

#msg {
  display: none;
  color: pink;
  font-size: 22px;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: pink;
  cursor: pointer;
}

@keyframes flicker {
  50% { transform: scale(1.3); }
}
</style>
</head>

<body>

<div id="intro">🎬 Loading Surprise...</div>

<div id="main">

<h1 id="text">🎉 Happy Birthday Priya 💖</h1>

<div class="cake">
  <div class="inner">

    <div class="candle">
      <div class="flame" id="flame"></div>
    </div>

    <div class="icing"></div>
    <div class="layer"></div>
    <div class="icing"></div>
    <div class="layer"></div>
    <div class="icing"></div>
    <div class="layer"></div>

  </div>
</div>

<button onclick="blow()">Blow Candle 🕯️</button>

<div class="gift" onclick="openGift()"></div>
<div id="msg">💌 You are my favorite person 💖</div>

</div>

<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<script>
/* BALLOONS */
for(let i=0;i<10;i++){
  let b=document.createElement("div");
  b.className="balloon";
  b.style.left=Math.random()*100+"vw";
  b.style.background=`hsl(${Math.random()*360},100%,50%)`;
  b.style.animationDuration=(Math.random()*5+5)+"s";
  document.body.appendChild(b);
}

/* BLOW */
function blow(){
  document.getElementById("flame").style.display="none";
}

/* GIFT */
function openGift(){
  document.querySelector(".gift").style.display="none";
  document.getElementById("msg").style.display="block";
}

/* MIC */
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
  let ctx=new AudioContext();
  let mic=ctx.createMediaStreamSource(stream);
  let analyser=ctx.createAnalyser();
  mic.connect(analyser);

  let data=new Uint8Array(analyser.frequencyBinCount);

  function detect(){
    analyser.getByteFrequencyData(data);
    let vol=data.reduce((a,b)=>a+b)/data.length;

    if(vol>60){
      blow();
    }
    requestAnimationFrame(detect);
  }
  detect();
});
</script>

</body>
</html>
